name: YouTube M3U8 → Netlify

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          npm install -g netlify-cli

      - name: Load cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # 🔥 AYRI STEP → HATA BURADA OLMAZ
      - name: Get stream link
        id: stream
        run: |
          LINK=$(yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=android" \
            -g "https://www.youtube.com/watch?v=EqoCJ8BPxtE")

          echo "link=$LINK" >> $GITHUB_OUTPUT

      - name: Create m3u8 file
        run: |
          mkdir deploy

          echo "#EXTM3U
#EXT-X-VERSION:3
#EXT-X-STREAM-INF:BANDWIDTH=800000
${{ steps.stream.outputs.link }}" > deploy/stream.m3u8

      - name: Deploy Netlify
        run: |
          netlify deploy \
            --prod \
            --dir=deploy \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_SITE_ID }}

      - name: Done
        run: echo "OK"
