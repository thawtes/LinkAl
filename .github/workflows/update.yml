name: M3U8 Link Güncelle

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: yt-dlp kur
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Link al
        run: |
          LINK=$(yt-dlp --js-runtimes node -g "https://www.youtube.com/watch?v=EqoCJ8BPxtE" | head -n 1)

          echo "LINK=$LINK"

          if [ -z "$LINK" ]; then
            echo "Link alınamadı!"
            exit 1
          fi

          echo "LINK=$LINK" >> $GITHUB_ENV

      - name: M3U8 oluştur
        run: |
          printf "#EXTM3U\n#EXT-X-STREAM-INF:BANDWIDTH=800000\n%s\n" "$LINK" > LinkBu.m3u8

      - name: Git push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add LinkBu.m3u8
          git commit -m "update" || echo "no change"
          git push
