name: M3U8 Link Güncelle

permissions:
  contents: write

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: yt-dlp güncel kur
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      # 🔥 BURASI EN ÖNEMLİ DEBUG STEP
      - name: Debug yt-dlp detaylı log
        run: |
          yt-dlp -v "https://www.youtube.com/watch?v=EqoCJ8BPxtE"

      - name: Link al
        run: |
          echo "Link alınıyor..."

          LINK=$(yt-dlp -g "https://www.youtube.com/watch?v=EqoCJ8BPxtE" | head -n 1)

          echo "Çekilen link: $LINK"

          if [ -z "$LINK" ]; then
            echo "❌ Link alınamadı!"
            exit 1
          fi

          echo "LINK=$LINK" >> $GITHUB_ENV

      - name: M3U8 oluştur
        run: |
          printf "#EXTM3U\n#EXT-X-VERSION:3\n#EXT-X-INDEPENDENT-SEGMENTS\n#EXT-X-STREAM-INF:NAME=Auto,RESOLUTION=854x480\n%s\n" "$LINK" > LinkBu.m3u8

          echo "Oluşturulan dosya:"
          cat LinkBu.m3u8

      - name: Git config
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Commit & push
        run: |
          git add LinkBu.m3u8

          if git diff --cached --quiet; then
            echo "Değişiklik yok"
            exit 0
          fi

          git commit -m "M3U8 link debug"
          git push origin HEAD:${{ github.ref_name }}
