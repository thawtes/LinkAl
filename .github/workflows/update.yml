name: M3U8 Link Güncelle

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: yt-dlp kur
        run: |
          sudo apt update
          sudo apt install -y yt-dlp

      - name: Link al
        run: |
          LINK=$(yt-dlp -f "best[protocol^=m3u8]" -g "https://www.youtube.com/watch?v=EqoCJ8BPxtE" | head -n 1)

          if [ -z "$LINK" ]; then
            echo "Link alınamadı!"
            exit 1
          fi

          echo "LINK=$LINK" >> $GITHUB_ENV

      - name: M3U8 oluştur
        run: |
          printf "#EXTM3U\n#EXT-X-VERSION:3\n#EXT-X-INDEPENDENT-SEGMENTS\n#EXT-X-STREAM-INF:NAME=480p,RESOLUTION=854x480\n%s\n" "$LINK" > LinkBu.m3u8

      - name: Git config
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Commit & push
        run: |
          git add LinkBu.m3u8
          git commit -m "M3U8 link otomatik güncellendi" || echo "Değişiklik yok"
          git push
