name: M3U8 Debug

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: yt-dlp kur
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Sistem bilgisi
        run: |
          echo "Node:"
          node -v
          echo "Python:"
          python3 --version
          echo "yt-dlp:"
          yt-dlp --version

      - name: Test bağlantı
        run: |
          curl -I https://www.youtube.com || true

      - name: yt-dlp FULL DEBUG (ASLA FAIL OLMAZ)
        run: |
          set +e
          yt-dlp -v "https://www.youtube.com/watch?v=EqoCJ8BPxtE"
          echo "EXIT CODE: $?"

      - name: Link çek (fail etmeden)
        run: |
          set +e
          LINK=$(yt-dlp -g "https://www.youtube.com/watch?v=EqoCJ8BPxtE" | head -n 1)
          echo "LINK=$LINK"
          echo "EXIT CODE: $?"
